<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Профиль</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        .app-container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 28px 24px 36px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .back-btn {
            text-decoration: none;
            color: #475569;
            font-size: 1.4rem;
            transition: 0.15s;
        }
        .back-btn:hover {
            color: #1e293b;
        }
        h1 {
            font-weight: 500;
            font-size: 1.5rem;
            color: #1e293b;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            flex-shrink: 0;
        }
        .profile-info {
            text-align: left;
        }
        .profile-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e293b;
        }
        .profile-email {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 2px;
        }
        .profile-join {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 4px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-number {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e293b;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }
        .section-title {
            font-weight: 500;
            font-size: 1rem;
            color: #1e293b;
            margin-bottom: 12px;
        }
        .progress-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .progress-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-item .label {
            width: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #475569;
            flex-shrink: 0;
        }
        .progress-bar-bg {
            flex: 1;
            height: 10px;
            background: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 20px;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-item .count {
            font-size: 0.8rem;
            color: #64748b;
            width: 50px;
            text-align: right;
            flex-shrink: 0;
        }
        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .profile-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <a class="back-btn" href="index.html">←</a>
        <h1>👤 Профиль</h1>
    </div>

    <div class="profile-header">
        <div class="avatar">🧑‍🎓</div>
        <div class="profile-info">
            <div class="profile-name">Ученик</div>
            <div class="profile-email">Твой email@example.com</div>
            <div class="profile-join">Занимаешься с июня 2026</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="totalLearned">0</div>
            <div class="stat-label">Выучено слов</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">0</div>
            <div class="stat-label">Дней подряд</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">0%</div>
            <div class="stat-label">Общий прогресс</div>
        </div>
    </div>

    <div class="section-title">📊 Прогресс по уровням</div>
    <div class="progress-list" id="progressList">
        <div class="progress-item">
            <span class="label">HSK 1</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="background:#f97316; width:0%;"></div></div>
            <span class="count">0 / 500</span>
        </div>
        <div class="progress-item">
            <span class="label">HSK 2</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="background:#3b82f6; width:0%;"></div></div>
            <span class="count">0 / 772</span>
        </div>
        <div class="progress-item">
            <span class="label">HSK 3</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="background:#8b5cf6; width:0%;"></div></div>
            <span class="count">0 / 973</span>
        </div>
        <div class="progress-item">
            <span class="label">HSK 4</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="background:#ec4899; width:0%;"></div></div>
            <span class="count">0 / 1000</span>
        </div>
        <div class="progress-item">
            <span class="label">HSK 5</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="background:#06b6d4; width:0%;"></div></div>
            <span class="count">0 / 1071</span>
        </div>
        <div class="progress-item">
            <span class="label">HSK 6</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="background:#8b5cf6; width:0%;"></div></div>
            <span class="count">0 / 1140</span>
        </div>
        <div class="progress-item">
            <span class="label">HSK 7-9</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="background:#f59e0b; width:0%;"></div></div>
            <span class="count">0 / 5636</span>
        </div>
    </div>
</div>

<script src="main/hsk-data.js"></script>
<script>
    function loadProgress() {
        try {
            const saved = localStorage.getItem('hsk_main');
            if (!saved) return;
            const data = JSON.parse(saved);
            const coloredState = data.coloredState || {};
            let totalLearned = 0;
            let totalWords = 0;

            document.querySelectorAll('.progress-item').forEach(item => {
                const label = item.querySelector('.label').textContent.trim();
                const levelId = label === 'HSK 7-9' ? '7-9' : label.replace('HSK ', '');
                const fill = item.querySelector('.progress-bar-fill');
                const count = item.querySelector('.count');

                if (HSK_DATA[levelId]) {
                    const words = HSK_DATA[levelId].words;
                    const state = coloredState[levelId] || [];
                    const learned = state.filter(v => v).length;
                    const total = words.length;
                    const pct = total > 0 ? (learned / total * 100) : 0;

                    fill.style.width = pct + '%';
                    count.textContent = learned + ' / ' + total;
                    totalLearned += learned;
                    totalWords += total;
                }
            });

            document.getElementById('totalLearned').textContent = totalLearned;
        } catch(e) {}
    }
    loadProgress();
</script>
</body>
</html>
