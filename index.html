<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Главная</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-init.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body:not(.ready) { display: none; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.15), transparent);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236,72,153,0.1), transparent);
            bottom: -100px;
            left: -100px;
            pointer-events: none;
        }
        .app-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 40px 32px 44px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }
        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            color: white;
            letter-spacing: -0.5px;
        }
        h1 span {
            background: linear-gradient(135deg, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .site-desc {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
            margin-bottom: 32px;
            font-weight: 400;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px 12px;
            text-decoration: none;
            color: white;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .card:hover::before { opacity: 1; }
        .card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.3);
        }
        .card-icon {
            font-size: 2.2rem;
            line-height: 1;
        }
        .card-title {
            font-weight: 600;
            font-size: 1rem;
        }
        .card-desc {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
        }
        .card.mark-card {
            background: rgba(99,102,241,0.1);
            border-color: rgba(99,102,241,0.2);
        }
        .card.mark-card:hover {
            background: rgba(99,102,241,0.2);
            border-color: rgba(99,102,241,0.4);
        }
        .auth-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .auth-bar .user-name {
            color: rgba(255,255,255,0.6);
        }
        .auth-bar #logoutBtn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.15s;
        }
        .auth-bar #logoutBtn:hover {
            border-color: rgba(255,255,255,0.3);
            color: white;
            background: rgba(255,255,255,0.05);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app-container { animation: fadeUp 0.6s ease; }
        @media (max-width: 500px) {
            .cards { grid-template-columns: 1fr; }
            h1 { font-size: 1.6rem; }
            .app-container { padding: 28px 20px 32px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="auth-bar" id="authBar"></div>

    <h1>📚 Hanzi</h1>
    <div class="site-desc">Изучение китайского языка</div>

    <div class="cards">
        <a class="card" href="pages/profile.html">
            <div class="card-icon">👤</div>
            <div class="card-title">Профиль</div>
            <div class="card-desc">Твой прогресс</div>
        </a>

        <a class="card mark-card" href="pages/marks.html">
            <div class="card-icon">📝</div>
            <div class="card-title">Мои отметки</div>
            <div class="card-desc">Отмечай изученные иероглифы</div>
        </a>

        <a class="card" href="pages/grammar.html">
            <div class="card-icon">📖</div>
            <div class="card-title">Грамматика</div>
            <div class="card-desc">Изучай грамматику по уровням</div>
        </a>
    </div>
</div>

<script>
    var authBar = document.getElementById('authBar');
    auth.onAuthStateChanged(function(user) {
        if (!user) {
            window.location.href = 'pages/login.html';
            return;
        }
        document.body.classList.add('ready');
        var name = user.displayName || user.email;
        authBar.innerHTML = '<span class="user-name">' + name + '</span> <button id="logoutBtn">Выйти</button>';
        document.getElementById('logoutBtn').addEventListener('click', function() {
            auth.signOut().then(function() { window.location.href = 'pages/login.html'; });
        });
    });
</script>
</body>
</html>
