<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Главная</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-init.js"></script>
    <link rel="stylesheet" href="css/themes.css">
    <script src="js/themes.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body:not(.ready) { display: none; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            position: relative;
            overflow-x: hidden;
        }
        .app-container {
            max-width: 700px;
            width: 100%;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 40px 32px 44px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        h1 { font-weight: 700; font-size: 2.2rem; letter-spacing: -0.5px; }
        h1 span { background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .site-desc { font-size: 0.95rem; margin-bottom: 32px; }
        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card {
            background: var(--topic-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px 12px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .card:hover::before { opacity: 0.3; }
        .card:hover {
            background: var(--card-hover);
            border-color: var(--card-hover-border);
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.3);
        }
        .card-icon { font-size: 2.2rem; line-height: 1; }
        .card-title { font-weight: 600; font-size: 1rem; }
        .card-desc { font-size: 0.78rem; color: var(--text-dim); }
        .auth-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 0.85rem; }
        .auth-bar .user-name { color: var(--text-muted); }
        .auth-bar #logoutBtn {
            background: none;
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.15s;
        }
        .auth-bar #logoutBtn:hover { border-color: var(--card-hover-border); color: var(--text); background: var(--card-hover); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .app-container { animation: fadeUp 0.6s ease; }
        @media (max-width: 500px) { .cards { grid-template-columns: 1fr; } h1 { font-size: 1.6rem; } .app-container { padding: 28px 20px 32px; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="auth-bar" id="authBar"></div>

    <h1>📚 Hanzi</h1>
    <div class="site-desc">Изучение китайского языка</div>

    <div class="cards">
        <a class="card" href="pages/profile.html">
            <div class="card-icon">👤</div>
            <div class="card-title">Профиль</div>
            <div class="card-desc">Твой прогресс</div>
        </a>

        <a class="card" href="pages/marks.html">
            <div class="card-icon">📝</div>
            <div class="card-title">Мои отметки</div>
            <div class="card-desc">Отмечай изученные иероглифы</div>
        </a>

        <a class="card" href="pages/grammar.html">
            <div class="card-icon">📖</div>
            <div class="card-title">Грамматика</div>
            <div class="card-desc">Изучай грамматику по уровням</div>
        </a>

        <a class="card" href="pages/dictionary.html">
            <div class="card-icon">🔍</div>
            <div class="card-title">Словарь</div>
            <div class="card-desc">Поиск иероглифов и перевод</div>
        </a>
    </div>
</div>

<script>
    var authBar = document.getElementById('authBar');
    auth.onAuthStateChanged(function(user) {
        if (!user) {
            window.location.href = 'pages/login.html';
            return;
        }
        document.body.classList.add('ready');
        var name = user.displayName || user.email;
        authBar.innerHTML = '<span class="user-name">' + name + '</span> <button id="logoutBtn">Выйти</button>';
        document.getElementById('logoutBtn').addEventListener('click', function() {
            auth.signOut().then(function() { window.location.href = 'pages/login.html'; });
        });
    });
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js')</script>
</body>
</html>
