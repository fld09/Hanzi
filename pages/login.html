<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Вход</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="../css/themes.css">
    <script src="../js/themes.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 36px 28px;
            text-align: center;
        }
        h1 { font-weight: 700; font-size: 1.8rem; margin-bottom: 4px; }
        h1 span { background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { font-size: 0.9rem; margin-bottom: 24px; }
        .field { margin-bottom: 14px; text-align: left; }
        .field label { display: block; font-weight: 500; font-size: 0.85rem; margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 12px 16px; border-radius: 14px;
            font-size: 0.95rem; outline: none; transition: 0.15s;
        }
        .field input::placeholder { color: var(--text-dim); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: 0.15s; margin-top: 6px;
            background: var(--btn-bg); color: white;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--btn-shadow); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .link { margin-top: 16px; font-size: 0.85rem; }
        .link a { text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .error { color: #f87171; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
        .back { display: inline-block; margin-bottom: 16px; text-decoration: none; font-size: 0.85rem; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeUp 0.5s ease; }
    </style>
</head>
<body>
<div class="card">
    <a class="back" href="../index.html">← На главную</a>
    <h1>📚 <span>Hanzi</span></h1>
    <div class="sub">Войти в аккаунт</div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Пароль</label>
        <input type="password" id="passInput" placeholder="Пароль" autocomplete="current-password">
    </div>

    <button class="btn" id="loginBtn">Войти</button>
    <div class="error" id="errorMsg"></div>

    <div class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script>
    const emailInput = document.getElementById('emailInput');
    const passInput = document.getElementById('passInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', function() {
        const email = emailInput.value.trim();
        const pass = passInput.value;

        if (!email) { errorMsg.textContent = 'Введи email'; return; }
        if (!pass) { errorMsg.textContent = 'Введи пароль'; return; }

        errorMsg.textContent = '';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Вход...';

        auth.signInWithEmailAndPassword(email, pass)
            .then(function() {
                window.location.href = '../index.html';
            })
            .catch(function(err) {
                var msg = err.message;
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') msg = 'Неверный email или пароль';
                else if (err.code === 'auth/wrong-password') msg = 'Неверный пароль';
                else if (err.code === 'auth/invalid-email') msg = 'Некорректный email';
                errorMsg.textContent = msg;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            });
    });
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('../sw.js')</script>
</body>
</html>
