<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Вход</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 36px 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-weight: 500; font-size: 1.6rem; color: #1e293b; margin-bottom: 4px; }
        .sub { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; }
        .field { margin-bottom: 14px; text-align: left; }
        .field label { display: block; font-weight: 500; font-size: 0.85rem; color: #475569; margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 14px;
            font-size: 0.95rem; outline: none; transition: 0.15s;
        }
        .field input:focus { border-color: #818cf8; }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: 0.15s; margin-top: 6px;
            background: #4f46e5; color: white;
        }
        .btn:hover { background: #4338ca; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .link { margin-top: 16px; font-size: 0.85rem; color: #64748b; }
        .link a { color: #4f46e5; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .error { color: #ef4444; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
        .back { display: inline-block; margin-bottom: 16px; text-decoration: none; color: #94a3b8; font-size: 0.85rem; }
        .back:hover { color: #475569; }
    </style>
</head>
<body>
<div class="card">
    <a class="back" href="../index.html">← На главную</a>
    <h1>📚 Hanzi</h1>
    <div class="sub">Войти в аккаунт</div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Пароль</label>
        <input type="password" id="passInput" placeholder="Пароль" autocomplete="current-password">
    </div>

    <button class="btn" id="loginBtn">Войти</button>
    <div class="error" id="errorMsg"></div>

    <div class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script>
    const emailInput = document.getElementById('emailInput');
    const passInput = document.getElementById('passInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', function() {
        const email = emailInput.value.trim();
        const pass = passInput.value;

        if (!email) { errorMsg.textContent = 'Введи email'; return; }
        if (!pass) { errorMsg.textContent = 'Введи пароль'; return; }

        errorMsg.textContent = '';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Вход...';

        auth.signInWithEmailAndPassword(email, pass)
            .then(function() {
                window.location.href = '../index.html';
            })
            .catch(function(err) {
                var msg = err.message;
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') msg = 'Неверный email или пароль';
                else if (err.code === 'auth/wrong-password') msg = 'Неверный пароль';
                else if (err.code === 'auth/invalid-email') msg = 'Некорректный email';
                errorMsg.textContent = msg;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            });
    });
</script>
</body>
</html>
