<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Вход</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 36px 28px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
            text-align: center;
        }
        h1 { font-weight: 700; font-size: 1.8rem; color: white; margin-bottom: 4px; }
        h1 span { background: linear-gradient(135deg, #c084fc, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 24px; }
        .field { margin-bottom: 14px; text-align: left; }
        .field label { display: block; font-weight: 500; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
            font-size: 0.95rem; outline: none; transition: 0.15s;
            background: rgba(255,255,255,0.05); color: white;
        }
        .field input::placeholder { color: rgba(255,255,255,0.25); }
        .field input:focus { border-color: rgba(99,102,241,0.5); background: rgba(255,255,255,0.08); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: 0.15s; margin-top: 6px;
            background: linear-gradient(135deg, #6366f1, #a855f7); color: white;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .link { margin-top: 16px; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
        .link a { color: #a5b4fc; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .error { color: #f87171; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
        .back { display: inline-block; margin-bottom: 16px; text-decoration: none; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
        .back:hover { color: rgba(255,255,255,0.6); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeUp 0.5s ease; }
    </style>
</head>
<body>
<div class="card">
    <a class="back" href="../index.html">← На главную</a>
    <h1>📚 <span>Hanzi</span></h1>
    <div class="sub">Войти в аккаунт</div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Пароль</label>
        <input type="password" id="passInput" placeholder="Пароль" autocomplete="current-password">
    </div>

    <button class="btn" id="loginBtn">Войти</button>
    <div class="error" id="errorMsg"></div>

    <div class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script>
    const emailInput = document.getElementById('emailInput');
    const passInput = document.getElementById('passInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', function() {
        const email = emailInput.value.trim();
        const pass = passInput.value;

        if (!email) { errorMsg.textContent = 'Введи email'; return; }
        if (!pass) { errorMsg.textContent = 'Введи пароль'; return; }

        errorMsg.textContent = '';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Вход...';

        auth.signInWithEmailAndPassword(email, pass)
            .then(function() {
                window.location.href = '../index.html';
            })
            .catch(function(err) {
                var msg = err.message;
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') msg = 'Неверный email или пароль';
                else if (err.code === 'auth/wrong-password') msg = 'Неверный пароль';
                else if (err.code === 'auth/invalid-email') msg = 'Некорректный email';
                errorMsg.textContent = msg;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            });
    });
</script>
</body>
</html>
