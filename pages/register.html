<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Регистрация</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 36px 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-weight: 500; font-size: 1.6rem; color: #1e293b; margin-bottom: 4px; }
        .sub { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; }
        .field { margin-bottom: 14px; text-align: left; }
        .field label { display: block; font-weight: 500; font-size: 0.85rem; color: #475569; margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 14px;
            font-size: 0.95rem; outline: none; transition: 0.15s;
        }
        .field input:focus { border-color: #818cf8; }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: 0.15s; margin-top: 6px;
            background: #4f46e5; color: white;
        }
        .btn:hover { background: #4338ca; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .link { margin-top: 16px; font-size: 0.85rem; color: #64748b; }
        .link a { color: #4f46e5; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .error { color: #ef4444; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
        .back { display: inline-block; margin-bottom: 16px; text-decoration: none; color: #94a3b8; font-size: 0.85rem; }
        .back:hover { color: #475569; }
        .success { color: #22c55e; font-size: 0.9rem; margin-top: 12px; }
    </style>
</head>
<body>
<div class="card">
    <a class="back" href="../index.html">← На главную</a>
    <h1>📚 Hanzi</h1>
    <div class="sub">Создать аккаунт</div>

        <div class="field">
            <label>Имя</label>
            <input type="text" id="nameInput" placeholder="Твоё имя" autocomplete="name">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="email@example.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="passInput" placeholder="Минимум 6 символов" autocomplete="new-password">
        </div>

        <button class="btn" id="registerBtn">Зарегистрироваться</button>
        <div class="error" id="errorMsg"></div>

        <div class="link">Уже есть аккаунт? <a href="login.html">Войти</a></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script>
    const nameInput = document.getElementById('nameInput');
    const emailInput = document.getElementById('emailInput');
    const passInput = document.getElementById('passInput');
    const registerBtn = document.getElementById('registerBtn');
    const errorMsg = document.getElementById('errorMsg');

    registerBtn.addEventListener('click', function() {
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const pass = passInput.value;

        if (!name) { errorMsg.textContent = 'Введи имя'; return; }
        if (!email) { errorMsg.textContent = 'Введи email'; return; }
        if (pass.length < 6) { errorMsg.textContent = 'Пароль минимум 6 символов'; return; }

        errorMsg.textContent = '';
        registerBtn.disabled = true;
        registerBtn.textContent = 'Регистрация...';

        auth.createUserWithEmailAndPassword(email, pass)
            .then(function(result) {
                return result.user.updateProfile({ displayName: name });
            })
            .then(function() {
                window.location.href = '../index.html';
            })
            .catch(function(err) {
                var msg = err.message;
                if (err.code === 'auth/email-already-in-use') msg = 'Этот email уже используется';
                else if (err.code === 'auth/invalid-email') msg = 'Некорректный email';
                errorMsg.textContent = msg;
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            });
    });
</script>
</body>
</html>
