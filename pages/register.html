<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Регистрация</title>
    <link rel="stylesheet" href="../css/themes.css">
    <script src="../js/themes.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 36px 28px;
            text-align: center;
        }
        h1 { font-weight: 700; font-size: 1.8rem; margin-bottom: 4px; }
        h1 span { background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { font-size: 0.9rem; margin-bottom: 24px; }
        .field { margin-bottom: 14px; text-align: left; }
        .field label { display: block; font-weight: 500; font-size: 0.85rem; margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 12px 16px; border-radius: 14px;
            font-size: 0.95rem; outline: none; transition: 0.15s;
        }
        .field input::placeholder { color: var(--text-dim); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: 0.15s; margin-top: 6px;
            background: var(--btn-bg); color: white;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--btn-shadow); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .link { margin-top: 16px; font-size: 0.85rem; }
        .link a { text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .error { color: #f87171; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
        .back { display: inline-block; margin-bottom: 16px; text-decoration: none; font-size: 0.85rem; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeUp 0.5s ease; }
    </style>
</head>
<body><script>try { document.body.classList.add('theme-' + (localStorage.getItem('hsk_theme') || 'night')); document.body.classList.add('ready'); } catch(e) {}</script>
<div class="card">
    <a class="back" href="../index.html">← На главную</a>
    <h1>📚 <span>Hanzi</span></h1>
    <div class="sub">Создать аккаунт</div>

        <div class="field">
            <label>Имя</label>
            <input type="text" id="nameInput" placeholder="Твоё имя" autocomplete="name">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="email@example.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="passInput" placeholder="Минимум 6 символов" autocomplete="new-password">
        </div>

        <button class="btn" id="registerBtn">Зарегистрироваться</button>
        <div class="error" id="errorMsg"></div>

        <div class="link">Уже есть аккаунт? <a href="login.html">Войти</a></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script>
    const nameInput = document.getElementById('nameInput');
    const emailInput = document.getElementById('emailInput');
    const passInput = document.getElementById('passInput');
    const registerBtn = document.getElementById('registerBtn');
    const errorMsg = document.getElementById('errorMsg');

    registerBtn.addEventListener('click', function() {
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const pass = passInput.value;

        if (!name) { errorMsg.textContent = 'Введи имя'; return; }
        if (!email) { errorMsg.textContent = 'Введи email'; return; }
        if (pass.length < 6) { errorMsg.textContent = 'Пароль минимум 6 символов'; return; }

        errorMsg.textContent = '';
        registerBtn.disabled = true;
        registerBtn.textContent = 'Регистрация...';

        auth.createUserWithEmailAndPassword(email, pass)
            .then(function(result) {
                return result.user.updateProfile({ displayName: name });
            })
            .then(function() {
                window.location.href = '../index.html';
            })
            .catch(function(err) {
                var msg = err.message;
                if (err.code === 'auth/email-already-in-use') msg = 'Этот email уже используется';
                else if (err.code === 'auth/invalid-email') msg = 'Некорректный email';
                errorMsg.textContent = msg;
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            });
    });
</script>
</body>
</html>
