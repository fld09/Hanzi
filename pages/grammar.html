    const GRAMMAR_LEVELS = ['1','2','3','4','5','6','7-9'];

    const navBar = document.getElementById('navBar');
    const topicList = document.getElementById('topicList');
    let currentLevel = '1';

    function buildNav() {
        navBar.innerHTML = '';
        GRAMMAR_LEVELS.forEach(id => {
            const data = GRAMMAR_DATA[id];
            const btn = document.createElement('button');
            btn.className = 'nav-btn' + (id === currentLevel ? ' active' : '');
            btn.dataset.level = id;
            btn.innerHTML = '<span class="level-badge" style="background:' + data.color + ';"></span>' + data.name;
            btn.addEventListener('click', function() {
                if (this.classList.contains('active')) return;
                switchLevel(this.dataset.level);
            });
            navBar.appendChild(btn);
        });
    }

    function switchLevel(level) {
        currentLevel = level;
        buildNav();
        renderTopics();
    }

    function renderTopics() {
        const data = GRAMMAR_DATA[currentLevel];
        if (!data || !data.topics) {
            topicList.innerHTML = '<div class="empty-state">Нет тем для этого уровня</div>';
            return;
        }
        topicList.innerHTML = '';
        data.topics.forEach(topic => {
            const div = document.createElement('div');
            div.className = 'topic';

            let examplesHtml = '';
            topic.examples.forEach(ex => {
                examplesHtml += '<div class="ex"><span class="cn">' + ex.cn + '</span><span class="ru">— ' + ex.ru + '</span></div>';
            });

            div.innerHTML = `
                <div class="topic-header">
                    <div class="topic-title">${topic.title}</div>
                    <div class="topic-toggle">▶</div>
                </div>
                <div class="topic-content">
                    <div class="topic-inner">
                        <div class="topic-explain">${topic.explain}</div>
                        <div class="topic-examples">${examplesHtml}</div>
                    </div>
                </div>
            `;
            div.addEventListener('click', function() {
                this.classList.toggle('open');
            });
            topicList.appendChild(div);
        });
    }

    auth.onAuthStateChanged(function(user) {
        if (!user) { window.location.href = 'login.html'; return; }
        document.body.classList.add('ready');
        buildNav();
        renderTopics();
    });
</script>
