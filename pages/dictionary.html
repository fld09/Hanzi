<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi — Словарь</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/firebase-init.js"></script>
    <link rel="stylesheet" href="../css/themes.css">
    <script src="../js/themes.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body:not(.ready) { display: none; }
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        .app-container { max-width: 700px; width: 100%; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 28px; padding: 24px 20px 30px; }
        .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .back-btn { text-decoration: none; font-size: 1.4rem; transition: 0.15s; }
        .back-btn:hover { color: var(--text); }
        h1 { font-weight: 700; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 14px 18px; border: 1px solid var(--input-border); border-radius: 16px;
            font-size: 1.1rem; outline: none; background: var(--input-bg); color: var(--text);
        }
        .search-box input::placeholder { color: var(--text-dim); }
        .search-box input:focus { border-color: var(--accent); }
        .search-box button {
            padding: 0 24px; border: none; border-radius: 16px; background: var(--btn-bg); color: white;
            font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.15s;
        }
        .search-box button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--btn-shadow); }
        .result-card {
            background: var(--topic-bg); border: 1px solid var(--topic-border); border-radius: 20px;
            padding: 24px; margin-bottom: 12px; display: none;
        }
        .result-card.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-word { font-size: 2.5rem; font-weight: 700; margin-bottom: 4px; }
        .result-pinyin { font-size: 1.1rem; color: var(--accent); margin-bottom: 8px; }
        .result-trans { font-size: 1rem; color: var(--text-muted); margin-bottom: 12px; }
        .result-levels { display: flex; gap: 6px; flex-wrap: wrap; }
        .level-tag {
            padding: 4px 12px; border-radius: 40px; font-size: 0.78rem; font-weight: 600;
            color: white;
        }
        .result-empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.9rem; }
        .voice-btn {
            display: inline-block; cursor: pointer; font-size: 1.2rem; margin-left: 8px;
            transition: 0.15s; vertical-align: middle;
        }
        .voice-btn:hover { transform: scale(1.2); }
        .voice-btn.playing { color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <a class="back-btn" href="../index.html">←</a>
        <h1>📖 <span style="background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Словарь</span></h1>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введи иероглиф, пиньин или слово..." autocomplete="off">
        <button id="searchBtn">Найти</button>
    </div>

    <div class="result-card" id="resultCard">
        <div class="result-word">
            <span id="resultWord">—</span>
            <span class="voice-btn" id="voiceBtn">🔊</span>
        </div>
        <div class="result-pinyin" id="resultPinyin"></div>
        <div class="result-trans" id="resultTrans"></div>
        <div class="result-levels" id="resultLevels"></div>
    </div>

    <div id="initMessage" class="result-empty">Введи иероглиф или слово для поиска</div>
</div>

<script src="../data/hsk-data.js"></script>
<script>
    var searchInput = document.getElementById('searchInput');
    var searchBtn = document.getElementById('searchBtn');
    var resultCard = document.getElementById('resultCard');
    var resultWord = document.getElementById('resultWord');
    var resultPinyin = document.getElementById('resultPinyin');
    var resultTrans = document.getElementById('resultTrans');
    var resultLevels = document.getElementById('resultLevels');
    var initMessage = document.getElementById('initMessage');
    var voiceBtn = document.getElementById('voiceBtn');

    function findLevels(word) {
        var found = [];
        Object.keys(HSK_DATA).forEach(function(id) {
            if (HSK_DATA[id].words.indexOf(word) !== -1) {
                found.push({ name: HSK_DATA[id].name, color: HSK_DATA[id].color });
            }
        });
        return found;
    }

    function search(word) {
        if (!word.trim()) return;
        initMessage.style.display = 'none';

        var levels = findLevels(word);

        resultWord.textContent = word;

        if (levels.length > 0) {
            resultLevels.innerHTML = '';
            levels.forEach(function(l) {
                var tag = document.createElement('span');
                tag.className = 'level-tag';
                tag.style.background = l.color;
                tag.textContent = l.name;
                resultLevels.appendChild(tag);
            });
        } else {
            resultLevels.innerHTML = '<span style="font-size:0.8rem;color:var(--text-dim);">Нет в базе HSK</span>';
        }

        resultTrans.textContent = 'Загрузка...';

        fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ru&dt=t&q=' + encodeURIComponent(word))
            .then(function(r) { return r.json(); })
            .then(function(d) {
                var t = '—';
                try { t = d[0][0][0] || '—'; } catch(e) {}
                resultTrans.textContent = t;
            })
            .catch(function() {
                if (levels.length > 0) resultTrans.textContent = 'Найдено в HSK, перевод недоступен';
                else resultTrans.textContent = 'Не найдено';
            });

        resultPinyin.textContent = '';
        resultCard.classList.add('show');
    }

    searchBtn.addEventListener('click', function() { search(searchInput.value); });
    searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') search(searchInput.value); });

    voiceBtn.addEventListener('click', function() {
        if (!window.speechSynthesis) return;
        var word = searchInput.value.trim();
        if (!word) return;
        voiceBtn.classList.add('playing');
        speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(word);
        u.lang = 'zh-CN';
        u.rate = 0.85;
        u.onend = function() { voiceBtn.classList.remove('playing'); };
        speechSynthesis.speak(u);
    });

    auth.onAuthStateChanged(function(user) {
        if (!user) { window.location.href = 'login.html'; return; }
        document.body.classList.add('ready');
    });
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('../sw.js')</script>
</body>
</html>
